<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couplage de Graphe — Ontologie ↔ Application</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a3a2a;font-family:'Share Tech Mono',monospace;color:#c8e6c9;overflow-x:hidden}
h1{text-align:center;padding:24px 0 8px;font-size:22px;color:#b87333;letter-spacing:2px;text-transform:uppercase}
.subtitle{text-align:center;font-size:13px;color:#6d9b7a;margin-bottom:18px;letter-spacing:1px}

/* PCB grid background */
.pcb-container{
  position:relative;
  width:100%;min-height:100vh;
  background:
    linear-gradient(rgba(40,90,60,0.3) 1px,transparent 1px),
    linear-gradient(90deg,rgba(40,90,60,0.3) 1px,transparent 1px);
  background-size:20px 20px;
  padding:0 30px 40px;
}

/* Category silkscreen labels */
.category{
  margin:20px 0 6px;
  position:relative;
}
.category-label{
  display:inline-block;
  border:1.5px solid rgba(255,255,255,0.7);
  border-radius:3px;
  padding:3px 12px;
  font-size:12px;
  color:rgba(255,255,255,0.85);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:8px;
  background:rgba(26,58,42,0.8);
}

/* Row = one coupling pair */
.pair-row{
  display:grid;
  grid-template-columns:1fr 60px 1fr;
  align-items:center;
  margin:3px 0;
  position:relative;
  height:44px;
}

/* IC chip node */
.chip{
  display:flex;align-items:center;
  background:#1e2d1e;
  border:1.5px solid #4a7a5a;
  border-radius:3px;
  padding:4px 10px;
  position:relative;
  cursor:pointer;
  transition:all 0.15s;
  height:38px;
  overflow:hidden;
}
.chip:hover,.chip.highlight{
  border-color:#b87333;
  background:#2a3d2a;
  box-shadow:0 0 8px rgba(184,115,51,0.4);
}
/* Notch */
.chip::before{
  content:'';position:absolute;top:50%;left:-1px;
  width:6px;height:12px;
  border-radius:0 6px 6px 0;
  border:1.5px solid #4a7a5a;border-left:none;
  transform:translateY(-50%);
  background:#1a3a2a;
}
.chip.right::before{left:auto;right:-1px;border-radius:6px 0 0 6px;border:1.5px solid #4a7a5a;border-right:none}

/* Pin dots */
.chip::after{
  content:'';position:absolute;
  top:4px;bottom:4px;right:6px;
  width:3px;
  background:repeating-linear-gradient(to bottom,#6d9b7a 0,#6d9b7a 2px,transparent 2px,transparent 6px);
}
.chip.right::after{right:auto;left:6px}

.chip-ref{font-size:9px;color:#b87333;margin-right:6px;white-space:nowrap;min-width:24px}
.chip-label{font-size:11px;color:#e0f0e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.chip.right{justify-content:flex-end;text-align:right}
.chip.right .chip-label{text-align:right}
.chip.right .chip-ref{margin-right:0;margin-left:6px;order:2}

/* Copper trace area (center column) */
.trace-zone{
  position:relative;
  height:100%;
  display:flex;align-items:center;justify-content:center;
}
.trace-line{
  position:absolute;
  top:50%;left:0;right:0;
  height:2px;
  background:#b87333;
  transform:translateY(-50%);
}
/* Solder points */
.solder{
  position:absolute;top:50%;
  width:8px;height:8px;
  border-radius:50%;
  background:#b87333;
  transform:translateY(-50%);
  z-index:2;
}
.solder.left{left:-4px}
.solder.right{right:-4px}
/* Via hole */
.via{
  width:10px;height:10px;
  border-radius:50%;
  border:2px solid #b87333;
  background:#1a3a2a;
  position:relative;z-index:3;
}
.via::after{
  content:'';position:absolute;top:50%;left:50%;
  width:4px;height:4px;border-radius:50%;
  background:#b87333;
  transform:translate(-50%,-50%);
}

/* Tooltip */
.tooltip{
  display:none;
  position:fixed;
  background:#0d1f14;
  border:1px solid #b87333;
  border-radius:4px;
  padding:8px 12px;
  font-size:11px;
  color:#e0d0b0;
  z-index:1000;
  max-width:320px;
  pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,0.5);
}
.tooltip .tt-onto{color:#7cb87c}
.tooltip .tt-code{color:#b87333}
.tooltip .tt-note{color:#aaa;font-style:italic}

/* Legend */
.legend{
  display:flex;gap:24px;justify-content:center;
  margin:16px 0 8px;font-size:11px;color:#6d9b7a;
}
.legend span{display:flex;align-items:center;gap:6px}
.legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.legend .dot.onto{background:#4a7a5a;border:1px solid #7cb87c}
.legend .dot.code{background:#5a4a2a;border:1px solid #b87333}
.legend .dot.trace{background:#b87333}

.columns-header{
  display:grid;grid-template-columns:1fr 60px 1fr;
  text-align:center;font-size:11px;color:#6d9b7a;
  padding:4px 0;margin-bottom:4px;
  border-bottom:1px solid rgba(109,155,122,0.3);
}
</style>
</head>
<body>
<div class="pcb-container">
<h1>Couplage de Graphe — Ontologie &#8596; Application</h1>
<p class="subtitle">Circuit imprime / bijection conceptuel &#8596; computationnel</p>

<div class="legend">
  <span><span class="dot onto"></span> Ontologie (conceptuel)</span>
  <span><span class="dot trace"></span> Couplage (trace cuivre)</span>
  <span><span class="dot code"></span> Application (code)</span>
</div>

<div class="columns-header">
  <div>&#9660; ONTOLOGIE</div>
  <div></div>
  <div>APPLICATION &#9660;</div>
</div>

<div id="pairs-container"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const DATA = [
  {cat:"ARCHITECTURES", pairs:[
    {id:"U1",onto:"ArchitectureConsommation",code:"app_consommation.py",note:"L'app entiere instancie l'architecture"},
    {id:"U2",onto:"ArchitectureConstruction",code:"app_construction.py",note:"L'app entiere instancie l'architecture"},
  ]},
  {cat:"ROLES", pairs:[
    {id:"U3",onto:"ConsommateurDonnees",code:"consumed_ids, liked_ids",note:"Sets passifs"},
    {id:"U4",onto:"ConstructeurDonnees",code:"dataset_id, pipeline_stage",note:"Etat actif"},
  ]},
  {cat:"CONCEPTS", pairs:[
    {id:"U5",onto:"Attention",code:"scroll drain / conscious intent",note:"consomme() vs preserve()"},
    {id:"U6",onto:"FluxDonnees",code:"feed_items table",note:"opereSur(Consommation)"},
    {id:"U7",onto:"StockDonnees",code:"datasets + dataset_rows",note:"opereSur(Construction)"},
    {id:"U8",onto:"TemporaliteContinue",code:"infinite scroll loop",note:"induit(Consommation)"},
    {id:"U9",onto:"TemporaliteDiscrete",code:"5-stage pipeline",note:"induit(Construction)"},
  ]},
  {cat:"MECANISMES", pairs:[
    {id:"R1",onto:"AlgorithmeFlux",code:"algorithme_flux()",note:"Trie par score/tendance"},
    {id:"R2",onto:"ScrollInfini",code:"feed_offset pagination",note:"Charger plus"},
    {id:"R3",onto:"Categories",code:'st.multiselect("Categories")',note:"Filtre"},
    {id:"R4",onto:"PipelineITO",code:"advance_pipeline()",note:"I-T-O discret"},
  ]},
  {cat:"COMPOSANTS CONSOMMATION", pairs:[
    {id:"C1",onto:"Feed",code:"visible_items loop",note:"Flux central"},
    {id:"C2",onto:"CarteContenu",code:"render_carte_contenu()",note:"Unite atomique"},
    {id:"C3",onto:"Notification",code:"render_notification_bar()",note:"Interruption push"},
    {id:"C4",onto:"BarreRecherche",code:"render_search_bar()",note:"Filtrage"},
    {id:"C5",onto:"Recommandation",code:"render_recommandations()",note:"Prolonge la session"},
  ]},
  {cat:"COMPOSANTS CONSTRUCTION", pairs:[
    {id:"C6",onto:"Formulaire",code:"render_formulaire()",note:"Saisie structuree"},
    {id:"C7",onto:"TableauEditable",code:"render_tableau_editable()",note:"Grille CRUD"},
    {id:"C8",onto:"PanneauRequete",code:"render_panneau_requete()",note:"SQL DuckDB"},
    {id:"C9",onto:"Canvas",code:"st.data_editor()",note:"Espace 2D"},
    {id:"C10",onto:"Terminal",code:"SQL text_area",note:"Ligne de commande"},
  ]},
  {cat:"ACTIONS CONSOMMATION", pairs:[
    {id:"A1",onto:"Scroller",code:'feed_offset + "Charger plus"',note:"Effort faible"},
    {id:"A2",onto:"Liker",code:"handle_like()",note:"Feedback minimal"},
    {id:"A3",onto:"Partager",code:"handle_share()",note:"Redistribuer"},
    {id:"A4",onto:"Sauvegarder",code:"handle_save()",note:"Flux → Stock"},
  ]},
  {cat:"ACTIONS CONSTRUCTION", pairs:[
    {id:"A5",onto:"Creer",code:'st.form("create_dataset")',note:"Effort eleve"},
    {id:"A6",onto:"Transformer",code:"pipeline nettoyee→transformee",note:"Restructuration"},
    {id:"A7",onto:"Requeter",code:"duckdb.sql(query)",note:"Interrogation"},
    {id:"A8",onto:"Valider",code:'advance_pipeline("publiee")',note:"Fin de cycle"},
    {id:"A9",onto:"Exporter",code:"st.download_button()",note:"CSV/JSON/Parquet"},
  ]},
  {cat:"ETATS CONSOMMATION", pairs:[
    {id:"S1",onto:"DonneeBrute",code:"etat='brute'",note:"Non traitee"},
    {id:"S2",onto:"DonneeAlgorithmisee",code:"etat='algorithmisee'",note:"Filtree"},
    {id:"S3",onto:"DonneeAffichee",code:"etat='affichee'",note:"Rendue"},
    {id:"S4",onto:"DonneeConsommee",code:"etat='consommee'",note:"Terminal"},
  ]},
  {cat:"ETATS CONSTRUCTION", pairs:[
    {id:"S5",onto:"DonneeBrute",code:"etat='brute'",note:"Ingeree"},
    {id:"S6",onto:"DonneeNettoyee",code:"etat='nettoyee'",note:"Nettoyee"},
    {id:"S7",onto:"DonneeTransformee",code:"etat='transformee'",note:"Restructuree"},
    {id:"S8",onto:"DonneeStructuree",code:"etat='structuree'",note:"Schema formel"},
    {id:"S9",onto:"DonneePubliee",code:"etat='publiee'",note:"Stock finalise"},
  ]},
];

const container = document.getElementById('pairs-container');
const tooltip = document.getElementById('tooltip');
let allRows = [];

DATA.forEach(group => {
  // Category label
  const catDiv = document.createElement('div');
  catDiv.className = 'category';
  catDiv.innerHTML = `<div class="category-label">${group.cat}</div>`;
  container.appendChild(catDiv);

  group.pairs.forEach(p => {
    const row = document.createElement('div');
    row.className = 'pair-row';
    row.dataset.id = p.id;
    row.innerHTML = `
      <div class="chip left" data-pair="${p.id}">
        <span class="chip-ref">${p.id}</span>
        <span class="chip-label">${p.onto}</span>
      </div>
      <div class="trace-zone">
        <div class="trace-line"></div>
        <div class="solder left"></div>
        <div class="solder right"></div>
        <div class="via"></div>
      </div>
      <div class="chip right" data-pair="${p.id}">
        <span class="chip-label">${p.code}</span>
        <span class="chip-ref">${p.id}</span>
      </div>
    `;
    container.appendChild(row);
    allRows.push({el:row, data:p});

    // Hover events
    const chips = row.querySelectorAll('.chip');
    chips.forEach(chip => {
      chip.addEventListener('mouseenter', e => {
        chips.forEach(c => c.classList.add('highlight'));
        row.querySelector('.trace-line').style.background = '#d4a04a';
        row.querySelector('.trace-line').style.height = '3px';
        row.querySelector('.trace-line').style.boxShadow = '0 0 6px rgba(212,160,74,0.6)';
        row.querySelectorAll('.solder').forEach(s => {s.style.background='#d4a04a';s.style.boxShadow='0 0 4px rgba(212,160,74,0.6)'});
        tooltip.style.display = 'block';
        tooltip.innerHTML = `<span class="tt-onto">${p.onto}</span> &#8596; <span class="tt-code">${p.code}</span><br><span class="tt-note">${p.note}</span>`;
      });
      chip.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY - 10) + 'px';
      });
      chip.addEventListener('mouseleave', () => {
        chips.forEach(c => c.classList.remove('highlight'));
        row.querySelector('.trace-line').style.background = '#b87333';
        row.querySelector('.trace-line').style.height = '2px';
        row.querySelector('.trace-line').style.boxShadow = 'none';
        row.querySelectorAll('.solder').forEach(s => {s.style.background='#b87333';s.style.boxShadow='none'});
        tooltip.style.display = 'none';
      });
    });
  });
});
</script>
</body>
</html>
